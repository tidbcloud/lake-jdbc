# Usage:
# lake-meta -c lake-meta-node-1.toml

log_dir                 = "./.lake/logs1"
admin_api_address       = "0.0.0.0:28101"
grpc_api_address        = "0.0.0.0:9191"
# Lake query fetches this address to update its meta endpoints list,
# in case the meta cluster changes.
grpc_api_advertise_host = "meta"

[raft_config]
id            = 1
raft_dir      = "./.lake/meta1"
raft_api_port = 28103

# Assign raft_{listen|advertise}_host in test config.
# This allows you to catch a bug in unit tests when something goes wrong in raft meta nodes communication. 
raft_listen_host = "0.0.0.0"
raft_advertise_host = "meta"

# Start up mode: single node cluster
single        = true
