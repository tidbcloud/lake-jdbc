name: Compatibility Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - "nightly"
          - "v1.2.889-nightly"
        driver:
          # "current" = use the jar built in this workflow run.
          # Add released versions (e.g. "0.4.6") here after they are
          # published to tidbcloud/lake-jdbc GitHub Releases.
          - "current"
          - "0.4.6"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Start Cluster With Nginx and Minio
        working-directory: tests
        run: make up
        env:
          LAKE_QUERY_VERSION: ${{ matrix.server }}

      - name: Build Test Jar
        run: mvn clean install -DskipTests --batch-mode --no-transfer-progress

      - name: Run compatibility tests
        working-directory: tests/compatibility
        run: bash test_compatibility.sh
        env:
          LAKE_JDBC_TEST_EXTRA_QUERY: presign=off
          LAKE_TEST_CONN_PORT: 8000
          LAKE_QUERY_VERSION: ${{ matrix.server }}
          LAKE_JDBC_VERSION: ${{ matrix.driver }}
          TEST_SIDE: "driver"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
