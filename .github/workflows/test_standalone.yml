name: Standalone Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      lake:
        image: datafuselabs/databend:nightly
        env:
          QUERY_DEFAULT_USER: tidbcloud
          QUERY_DEFAULT_PASSWORD: tidbcloud
          MINIO_ENABLED: true
        # options: >-
        #   --health-cmd "curl -fs http://localhost:8000/v1/health || exit 1"
        #   --health-interval 10s
        #   --health-timeout 5s
        #   --health-retries 5
        ports:
          - 8000:8000
          - 9000:9000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }} # Value of the GPG private key to import
          gpg-passphrase: MAVEN_GPG_PASSPHRASE # env variable for GPG private key passphrase

      - name: Verify Service Running
        run: |
          for i in {1..30}; do
            if curl -fsS -u tidbcloud:tidbcloud --request POST http://localhost:8000/v1/query --header 'Content-Type:application/json' --data-raw '{"sql":"select 1"}' >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cid=$(docker ps -a | awk '/datafuselabs\\/databend/ {print $1; exit}')
          if [ -n "${cid}" ]; then
            docker logs "${cid}"
          fi
          exit 1

      - name: Run Maven clean deploy with release profile
        run: mvn test -DexcludedGroups=MULTI_HOST,FLAKY
        env:
          LAKE_JDBC_TEST_EXTRA_QUERY: presign=off
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
