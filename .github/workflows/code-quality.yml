name: Code Quality Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main, master ]
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  checkstyle:
    name: Run Checkstyle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: |
          mvn checkstyle:checkstyle -B -q
        continue-on-error: true

      - name: Report Checkstyle results
        uses: jwgmeligmeyling/checkstyle-github-action@master
        # GITHUB_TOKEN is read-only for PRs from forks, so this reporting step
        # cannot create a check run there ("Resource not accessible by
        # integration"). Skip it for fork PRs and never let it fail the job.
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        with:
          path: '**/checkstyle-result.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          name: 'Checkstyle Report'
          title: 'Checkstyle Results'

      - name: Upload Checkstyle results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkstyle-results
          path: |  
            **/target/checkstyle-result.xml
            **/target/site/checkstyle.html
          retention-days: 7
          if-no-files-found: warn
